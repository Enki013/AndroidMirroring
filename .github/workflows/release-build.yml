name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Fetch bundled binaries
        run: |
          chmod +x scripts/fetch-binaries.sh
          scripts/fetch-binaries.sh

      - name: Build Release
        run: |
          xcodebuild clean build \
            -project AndroidMirror.xcodeproj \
            -scheme AndroidMirror \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package app
        run: |
          mkdir -p build/release
          ditto -c -k --sequesterRsrc --keepParent \
            "build/DerivedData/Build/Products/Release/Android Mirror.app" \
            "build/release/AndroidMirror-macOS.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AndroidMirror-macOS
          path: build/release/AndroidMirror-macOS.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/release/AndroidMirror-macOS.zip
